version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: anxshowtime-backend
    ports:
      - "8000:8000"
    volumes:
      - ./timesheet.db:/app/timesheet.db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: anxshowtime-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
